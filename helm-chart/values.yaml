# Complete Observability Stack Configuration
# This values.yaml configures the entire observability stack including:
# API App, Grafana, Loki, Tempo, Pyroscope, Alloy, Mimir, OTel Collector, MySQL

# Global configuration
global:
  namespace: api-app-go
  storageClass: standard
  imagePullPolicy: IfNotPresent

# ========================================
# APPLICATION CONFIGURATION
# ========================================
inventoryApp:
  enabled: true
  name: inventory-app
  replicaCount: 1
  image:
    repository: gab796/inventory_app
    tag: v4.0
    pullPolicy: IfNotPresent

  ports:
    http: 10000
    metrics: 2113

  resources:
    limits:
      memory: "128Mi"
      cpu: "500m"
    requests:
      memory: "64Mi"
      cpu: "250m"

  # Environment variables
  env:
    DB_HOST: mysql-service
    DB_NAME: inventory
    DB_USER: root
    OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-service.api-app-go:4317
    PYROSCOPE_URL: http://pyroscope:4040

  # Database password from secret (injected via Terraform set_sensitive)
  secret:
    dbPassword: ""

  observability:
    prometheus:
      metricsPath: /metrics

  externalSecret:
    enabled: true
    vaultUrl: "http://vault.vault.svc.cluster.local:8200"
    secretPath: "inventory"

# ========================================
# DATABASE CONFIGURATION
# ========================================
mysql:
  enabled: true
  name: mysql
  replicaCount: 1
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent

  port: 3306

  resources:
    limits:
      memory: "1Gi"
      cpu: "1000m"
    requests:
      memory: "512Mi"
      cpu: "500m"

  # Database configuration (rootPassword injected via Terraform set_sensitive)
  config:
    rootPassword: ""
    database: "inventory"

  # Storage
  persistence:
    size: 10Gi
    storageClass: ""

  pdb:
    enabled: false
    minAvailable: 1

# ========================================
# GRAFANA CONFIGURATION
# ========================================
grafana:
  enabled: true
  name: grafana
  replicaCount: 1
  image:
    repository: grafana/grafana
    tag: 11.6.0
    pullPolicy: IfNotPresent

  port: 3000

  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"

  # Grafana configuration
  config:
    auth:
      anonymousEnabled: true
      anonymousOrgRole: Admin
      disableLoginForm: true
    server:
      rootUrl: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      serveFromSubPath: true

  # Datasources configuration
  datasources:
    prometheus:
      url: http://alloy:12345/api/v1/push
      type: prometheus
    loki:
      url: http://loki:3100
      type: loki
    tempo:
      url: http://tempo:3200
      type: tempo
    pyroscope:
      url: http://pyroscope:4040
      type: phlare

  dashboards:
    enabled: true

  autoscaling:
    enabled: false  # RWO PVC impede scaling real no Kind — ver docs/troubelshooting.md
    minReplicas: 1
    maxReplicas: 2
    targetMemoryUtilizationPercentage: 30

# ========================================
# LOKI CONFIGURATION
# ========================================
loki:
  enabled: true
  name: loki
  replicaCount: 1
  image:
    repository: grafana/loki
    tag: 2.9.5
    pullPolicy: IfNotPresent

  ports:
    http: 3100
    grpc: 9095

  resources:
    limits:
      memory: "1Gi"
      cpu: "1000m"
    requests:
      memory: "512Mi"
      cpu: "500m"

  # Loki configuration
  config:
    authEnabled: false
    server:
      httpListenPort: 3100
      logLevel: warn
    storage:
      type: filesystem
      filesystem:
        chunksDirectory: /loki/chunks
        rulesDirectory: /loki/rules

  autoscaling:
    enabled: true  # Stateless com MinIO + memberlist para coordenação entre réplicas
    minReplicas: 1
    maxReplicas: 2
    targetMemoryUtilizationPercentage: 30

# ========================================
# TEMPO CONFIGURATION
# ========================================
tempo:
  enabled: true
  name: tempo
  replicaCount: 1
  image:
    repository: grafana/tempo
    tag: 2.6.0
    pullPolicy: IfNotPresent

  ports:
    http: 3200
    otlpGrpc: 4317
    otlpHttp: 4318

  resources:
    limits:
      memory: "1Gi"
      cpu: "1000m"
    requests:
      memory: "512Mi"
      cpu: "500m"

  # Tempo configuration
  config:
    server:
      httpListenPort: 3200
      logLevel: warn
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces

  autoscaling:
    enabled: false  # RWO PVC impede scaling real no Kind — ver docs/troubelshooting.md
    minReplicas: 1
    maxReplicas: 2
    targetMemoryUtilizationPercentage: 30

# ========================================
# PYROSCOPE CONFIGURATION
# ========================================
pyroscope:
  enabled: true
  name: pyroscope
  replicaCount: 1
  image:
    repository: grafana/pyroscope
    tag: 1.13.0
    pullPolicy: IfNotPresent

  ports:
    http: 4040
    grpc: 4041

  resources:
    limits:
      memory: "1Gi"
      cpu: "1000m"
    requests:
      memory: "512Mi"
      cpu: "500m"

  # Pyroscope configuration
  config:
    server:
      httpListenPort: 4040
      grpcListenPort: 4041
      logLevel: warn
    storage:
      backend: filesystem
      filesystem:
        path: /var/pyroscope

  autoscaling:
    enabled: false  # RWO PVC impede scaling real no Kind — ver docs/troubelshooting.md
    minReplicas: 1
    maxReplicas: 2
    targetMemoryUtilizationPercentage: 30

# ========================================
# ALLOY CONFIGURATION
# ========================================
alloy:
  enabled: false  # ⚠️ Controlado pelo Terraform via terraform.tfvars (alloy_enabled)
  name: alloy
  replicaCount: 1
  image:
    repository: grafana/alloy
    tag: v1.9.1
    pullPolicy: IfNotPresent

  ports:
    http: 12345
    grpc: 12346

  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"

  # Alloy configuration for metrics collection
  config:
    server:
      httpListenPort: 12345
    logging:
      level: warn

  autoscaling:
    enabled: false  # RWO PVC impede scaling real no Kind — ver docs/troubelshooting.md
    minReplicas: 1
    maxReplicas: 2
    targetMemoryUtilizationPercentage: 30

# ========================================
# MIMIR CONFIGURATION
# ========================================
mimir:
  enabled: true
  name: mimir
  replicaCount: 1
  image:
    repository: grafana/mimir
    tag: 2.13.0
    pullPolicy: IfNotPresent

  ports:
    http: 8080
    grpc: 9095

  resources:
    limits:
      memory: "2Gi"
      cpu: "1000m"
    requests:
      memory: "1Gi"
      cpu: "500m"

  # Mimir configuration
  config:
    target: all
    server:
      httpListenPort: 9009
      logLevel: warn
    storage:
      backend: filesystem
      filesystem:
        dir: /var/mimir

  # AlertManager integration — overridden via Terraform locals when alertmanager_enabled=true
  alertmanager:
    enabled: true
    url: ""

  autoscaling:
    enabled: true  # WAL em emptyDir, blocos no MinIO — HPA habilitado
    minReplicas: 1
    maxReplicas: 2
    targetMemoryUtilizationPercentage: 30

# ========================================
# MINIO CONFIGURATION
# ========================================
minio:
  enabled: true
  name: minio
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent

  credentials:
    rootUser: minio
    rootPassword: ""  # injected via Terraform set_sensitive

  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"

# ========================================
# OPENTELEMETRY COLLECTOR CONFIGURATION
# ========================================
otelCollector:
  enabled: true
  name: otel-collector
  replicaCount: 1
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: 0.123.0
    pullPolicy: IfNotPresent

  ports:
    otlpGrpc: 4317
    otlpHttp: 4318
    metrics: 8889
    healthCheck: 13133

  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"

  # OTel Collector configuration
  config:
    prometheus:
      scrapeInterval: "15s"
      scrapeMimir: true
      mimirScrapeInterval: "30s"
      scrapeKubeStateMetrics: true
      kubeStateMetrics:
        scrapeInterval: "30s"
        metricsPath: /metrics
        namespaces: []
    logging:
      level: "info"
    datadog:
      enabled: false
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlp/tempo:
        endpoint: http://tempo:4317
        tls:
          insecure: true
      prometheusremotewrite:
        endpoint: http://mimir:9009/api/v1/push

  autoscaling:
    enabled: false # DaemonSet não suporta HPA — escala automaticamente com novos nós

# ========================================
# INGRESS CONFIGURATION
# ========================================
ingress:
  enabled: true
  className: nginx
  annotations: {}

  hosts:
    - host: inventory.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inventory-service
                port:
                  number: 10000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: inventory-app-metrics-service
                port:
                  number: 2113

    - host: grafana-web.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

    - host: loki.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100

    - host: tempo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tempo
                port:
                  number: 3200

    - host: mimir.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mimir
                port:
                  number: 9009

    - host: pyroscope.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pyroscope
                port:
                  number: 4040

    - host: alloy.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alloy
                port:
                  number: 12345

    - host: minio.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
# ========================================
# SERVICE CONFIGURATION
# ========================================
services:
  type: ClusterIP
  # Each component will have its own service created automatically

# ========================================
# SECURITY CONFIGURATION
# ========================================
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podSecurityContext: {}
securityContext: {}

# ========================================
# RBAC CONFIGURATION (for Alloy)
# ========================================
rbac:
  create: true
  # ClusterRole permissions for Alloy to scrape metrics
  clusterRole:
    rules:
      - apiGroups: [""]
        resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["extensions"]
        resources: ["ingresses"]
        verbs: ["get", "list", "watch"]

# ========================================
# PERSISTENCE CONFIGURATION
# ========================================
persistence:
  storageClass: standard
  accessMode: ReadWriteOnce
  sizes:
    mysql: 10Gi
    tempo: 10Gi
    pyroscope: 5Gi
    minio: 10Gi
    grafana: 5Gi
    alloy: 5Gi

# ========================================
# MONITORING CONFIGURATION
# ========================================
monitoring:
  # Enable ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    interval: 30s
    path: /metrics

  # Health checks
  healthChecks:
    enabled: true
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 5

# ========================================
# SCALING CONFIGURATION
# ========================================
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 30

# ========================================
# NODE CONFIGURATION
# ========================================
nodeSelector: {}
tolerations: []
affinity: {}

# ========================================
# ADDITIONAL CONFIGURATION
# ========================================
# Additional labels to be added to all resources
commonLabels:
  app.kubernetes.io/part-of: api-observabilidade
  environment: development

# Additional annotations to be added to all resources
commonAnnotations: {}

# Image pull secrets for private registries
imagePullSecrets: []

# ========================================
# NETWORK POLICY CONFIGURATION
# ========================================
# Segurança: Controla tráfego de rede entre pods
# WARNING: Desabilitar pode quebrar tráfego de telemetria!
networkPolicy:
  enabled: true  # ⚠️  Mude para false se houver problemas de conectividade

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
