{{- /* HPAs for observability stack components — inventory-app handled in inventory-app-hpa.yaml */}}

{{- if and .Values.grafana.enabled (dig "autoscaling" "enabled" false .Values.grafana) }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.grafana.name }}-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.grafana.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.grafana.name }}
  minReplicas: {{ .Values.grafana.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ .Values.grafana.autoscaling.maxReplicas | default 2 }}
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.grafana.autoscaling.targetMemoryUtilizationPercentage | default 30 }}
{{- end }}

