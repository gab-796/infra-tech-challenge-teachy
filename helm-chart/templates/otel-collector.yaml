{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.otelCollector.name }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.otelCollector.name }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:{{ .Values.otelCollector.ports.otlpGrpc }}"

      # Configuração para coletar métricas da app
      prometheus:
        config:
          scrape_configs:
            - job_name: '{{ .Values.inventoryApp.name }}'
              static_configs:
                - targets: ['{{ .Values.inventoryApp.name }}-metrics-service:{{ .Values.inventoryApp.ports.metrics }}']
              scrape_interval: {{ .Values.otelCollector.config.prometheus.scrapeInterval | default "15s" }}
              metrics_path: {{ .Values.inventoryApp.observability.prometheus.metricsPath }}

            - job_name: loki-metrics
              scrape_interval: 15s
              static_configs:
                - targets:
                    - {{ .Values.loki.name }}:{{ .Values.loki.ports.http }}

            {{- if .Values.otelCollector.config.prometheus.scrapeMimir }}
            - job_name: 'mimir-metrics'
              scheme: http
              scrape_timeout: 10s
              kubernetes_sd_configs:
                - role: endpoints
                  namespaces:
                    names:
                      - {{ .Values.global.namespace }}
              relabel_configs:
                # Mantém apenas o Service do Mimir
                - source_labels: [__meta_kubernetes_service_name]
                  action: keep
                  regex: ^{{ .Values.mimir.name }}$
                # Mantém apenas a porta http (8080) do Service
                - source_labels: [__meta_kubernetes_endpoint_port_name]
                  action: keep
                  regex: ^http$
                # Enriquecimento com labels úteis
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: kube_namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: kube_pod
                - source_labels: [__meta_kubernetes_service_name]
                  target_label: kube_service
                - source_labels: [__meta_kubernetes_pod_controller_kind]
                  target_label: kube_workload_kind
                - source_labels: [__meta_kubernetes_pod_controller_name]
                  target_label: kube_workload_name
              scrape_interval: {{ .Values.otelCollector.config.prometheus.mimirScrapeInterval | default "30s" }}
              metrics_path: /metrics
            {{- end }}

            {{- if .Values.otelCollector.config.prometheus.scrapeKubeStateMetrics }}
            # Kube State Metrics - descobre automaticamente via service discovery
            - job_name: 'kube-state-metrics'
              kubernetes_sd_configs:
                - role: service
                  {{- if .Values.otelCollector.config.prometheus.kubeStateMetrics.namespaces }}
                  namespaces:
                    names: {{ toYaml .Values.otelCollector.config.prometheus.kubeStateMetrics.namespaces | nindent 22 }}
                  {{- end }}
              relabel_configs:
                # Mantém apenas o Service exato do kube-state-metrics
                - source_labels: [__meta_kubernetes_service_name]
                  action: keep
                  regex: ^ksm-kube-state-metrics$

                # Usar porta de métricas (geralmente 8080)
                - source_labels: [__address__, __meta_kubernetes_service_port_number]
                  action: replace
                  target_label: __address__
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2

                # Labels úteis
                - source_labels: [__meta_kubernetes_service_name]
                  target_label: service
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - target_label: job
                  replacement: kube-state-metrics

              scrape_interval: {{ .Values.otelCollector.config.prometheus.kubeStateMetrics.scrapeInterval | default "30s" }}
              metrics_path: {{ .Values.otelCollector.config.prometheus.kubeStateMetrics.metricsPath | default "/metrics" }}
            {{- end }}

            # cAdvisor (via API server proxy para kubelet) - coleta métricas de containers/nodes
            - job_name: 'cadvisor'
              scheme: https
              scrape_interval: {{ .Values.otelCollector.config.prometheus.scrapeInterval | default "30s" }}
              kubernetes_sd_configs:
                - role: node
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              relabel_configs:
                # Copia labels de node
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                # Roteia via API server para cada kubelet
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
                # Label amigável do node
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: kube_node

      # Coleta de logs dos pods via filelog (todos os namespaces)
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: router
            id: get-format
            on_error: drop
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
            default: parser-crio
          - type: json_parser
            id: parser-docker
            output: extract-metadata-from-filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: regex_parser
            id: parser-crio
            regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract-metadata-from-filepath
            on_error: drop
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.999999999Z07:00'
          - type: regex_parser
            id: extract-metadata-from-filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]+)\/(?P<container_name>[^\._]+)\/(?P<restart_count>[0-9]+)\.log$'
            parse_from: attributes["log.file.path"]
          - type: move
            from: attributes.log
            to: body
          - type: move
            from: attributes.container_name
            to: resource["k8s.container.name"]
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]
          - type: remove
            field: attributes.time
          - type: remove
            field: attributes.logtag
          - type: remove
            field: attributes.uid
          - type: remove
            field: attributes.restart_count
          - type: json_parser
            id: parse-body-json
            if: 'body matches "^\\{"'
            on_error: send
            trace_id:
              parse_from: attributes.trace_id
            span_id:
              parse_from: attributes.span_id
          - type: move
            from: attributes.msg
            to: body
            if: 'attributes.msg != nil'

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
        send_batch_max_size: 2048

      memory_limiter:
        # 80% da memória que você definiu no resources.limits
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.node.name
          labels:
            - tag_name: service
              key: app
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name

      transform/cleanup_logs:
        log_statements:
          - context: log
            statements:
              - delete_key(attributes, "stream")
              - delete_key(attributes, "log.file.path")
              - delete_key(attributes, "time")
              - delete_key(attributes, "msg")
              - delete_key(attributes, "error")

      transform/loki_hints:
        log_statements:
          - context: resource
            statements:
              - set(attributes["loki.resource.labels"], "k8s.namespace.name,k8s.pod.name,k8s.container.name,service")
          - context: log
            statements:
              - set(attributes["loki.attribute.labels"], "level, status_code, method")

    exporters:
      # Exporter para traces (Tempo)
      otlp:
        endpoint: {{ .Values.tempo.name }}:{{ .Values.tempo.ports.otlpGrpc }}
        tls:
          insecure: true

      # Exporter para métricas (Mimir)
      prometheusremotewrite:
        endpoint: http://{{ .Values.mimir.name }}:{{ .Values.mimir.config.server.httpListenPort }}/api/v1/push
        timeout: 30s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Exporter para logs (Loki)
      loki:
        endpoint: http://{{ .Values.loki.name }}:{{ .Values.loki.ports.http }}/loki/api/v1/push
        default_labels_enabled:
          exporter: false
          job: true
          instance: false
          level: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: {{ .Values.otelCollector.config.logging.level | quote }}
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
        metrics:
          receivers: [prometheus]
          processors: [batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, transform/cleanup_logs, transform/loki_hints, batch]
          exporters: [loki]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.otelCollector.name }}
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.otelCollector.name }}
rules:
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - endpointslices
      - nodes
      - nodes/proxy
      - nodes/metrics
      - pods
      - pods/log
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - deployments
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.otelCollector.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.otelCollector.name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.otelCollector.name }}
    namespace: {{ .Values.global.namespace }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Values.otelCollector.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.otelCollector.name }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.otelCollector.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.otelCollector.name }}
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.otelCollector.name }}
      containers:
        - name: {{ .Values.otelCollector.name }}
          image: {{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}
          command:
            - "/otelcol-contrib"
            - "--config=/conf/otel-collector-config.yaml"
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.tempo.name }}:{{ .Values.tempo.ports.otlpGrpc | quote }}
            {{- if .Values.otelCollector.config.datadog.enabled }}
            # Configuração comentada do Datadog (mantendo do manifesto)
            # - name: DD_API_KEY_GO_LAB
            #   valueFrom:
            #     secretKeyRef:
            #       name: datadog-api-key
            #       key: DD_API_KEY_GO_LAB
            {{- end }}
          ports:
            - containerPort: {{ .Values.otelCollector.ports.otlpGrpc }}
              name: otlp-grpc
            - containerPort: {{ .Values.otelCollector.ports.otlpHttp }}
              name: otlp-http
            - containerPort: {{ .Values.otelCollector.ports.healthCheck }}
              name: health
          volumeMounts:
            - name: config-vol
              mountPath: /conf
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
          {{- if .Values.monitoring.healthChecks.enabled }}
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.otelCollector.ports.healthCheck }}
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 50
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.otelCollector.ports.healthCheck }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.otelCollector.ports.healthCheck }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 10
            timeoutSeconds: 5
          {{- end }}
      volumes:
        - name: config-vol
          configMap:
            name: {{ .Values.otelCollector.name }}-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.otelCollector.name }}-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.otelCollector.name }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    app: {{ .Values.otelCollector.name }}
  ports:
    - name: otlp-grpc
      port: {{ .Values.otelCollector.ports.otlpGrpc }}
      targetPort: {{ .Values.otelCollector.ports.otlpGrpc }}
      protocol: TCP
    - name: health
      port: {{ .Values.otelCollector.ports.healthCheck }}
      targetPort: {{ .Values.otelCollector.ports.healthCheck }}
      protocol: TCP
  type: {{ .Values.services.type }}
{{- end }}