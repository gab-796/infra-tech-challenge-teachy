---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: api-app-go
data:
  mimir.yaml: |
    target: all

    multitenancy_enabled: false

    server:
      http_listen_port: {{ .Values.mimir.config.server.httpListenPort }}
      log_level: warn

    blocks_storage:
      {{- if .Values.minio.enabled }}
      backend: s3
      s3:
        endpoint: {{ .Values.minio.name }}.{{ .Values.global.namespace }}.svc.cluster.local:9000
        bucket_name: mimir-blocks
        access_key_id: {{ .Values.minio.credentials.rootUser }}
        secret_access_key: ${MINIO_ROOT_PASSWORD}
        insecure: true
      {{- else }}
      backend: filesystem
      filesystem:
        dir: /data/blocks
      {{- end }}

    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: memberlist

    distributor:
      ring:
        kvstore:
          store: memberlist

    store_gateway:
      sharding_ring:
        replication_factor: 1
        kvstore:
          store: memberlist

    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: memberlist

    ruler:
      {{- if .Values.mimir.alertmanager.enabled }}
      alertmanager_url: {{ .Values.mimir.alertmanager.url }}
      enable_api: true
      {{- end }}
      ring:
        kvstore:
          store: memberlist

    memberlist:
      join_members:
        - mimir-headless.{{ .Values.global.namespace }}.svc.cluster.local:7946

    {{- if .Values.mimir.alertmanager.enabled }}
    ruler_storage:
      backend: local
      local:
        directory: /rules
    {{- end }}

    limits:
      max_label_names_per_series: 30
      max_label_value_length: 2048
      ingestion_rate: 1000000
      ingestion_burst_size: 1000000
      out_of_order_time_window: 10m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: api-app-go
  labels:
    app: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      {{- if .Values.minio.enabled }}
      initContainers:
        - name: minio-init-bucket
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set myminio http://{{ .Values.minio.name }}.{{ .Values.global.namespace }}.svc.cluster.local:9000 {{ .Values.minio.credentials.rootUser }} $MINIO_ROOT_PASSWORD; do
                echo "Aguardando MinIO ficar disponivel..."
                sleep 5
              done
              mc mb --ignore-existing myminio/mimir-blocks
              echo "Bucket mimir-blocks criado/verificado com sucesso."
      {{- end }}
      containers:
        - name: mimir
          image: grafana/mimir:2.13.0
          args:
            - -config.file=/etc/mimir/mimir.yaml
            - -config.expand-env=true
            - -target=all
          ports:
            - containerPort: {{ .Values.mimir.config.server.httpListenPort }}
              name: http
            - containerPort: 7946
              name: memberlist
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: mimir-storage
              mountPath: /data
            - name: mimir-config
              mountPath: /etc/mimir
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.mimir.alertmanager.enabled }}
            - name: mimir-rules
              mountPath: /rules/anonymous
              readOnly: true
            {{- end }}
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.mimir.config.server.httpListenPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.mimir.config.server.httpListenPort }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: mimir-storage
          emptyDir: {}
        - name: mimir-config
          configMap:
            name: mimir-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.mimir.alertmanager.enabled }}
        - name: mimir-rules
          configMap:
            name: mimir-alerting-rules
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: api-app-go
spec:
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.mimir.config.server.httpListenPort }}
      targetPort: {{ .Values.mimir.config.server.httpListenPort }}
  selector:
    app: mimir
---
apiVersion: v1
kind: Service
metadata:
  name: mimir-headless
  namespace: {{ .Values.global.namespace }}
  labels:
    app: mimir
spec:
  clusterIP: None
  ports:
    - name: memberlist
      port: 7946
      targetPort: 7946
      protocol: TCP
  selector:
    app: mimir