---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: api-app-go
data:
  mimir.yaml: |
    target: all

    multitenancy_enabled: false

    server:
      http_listen_port: {{ .Values.mimir.config.server.httpListenPort }}
      log_level: warn

    blocks_storage:
      {{- if .Values.minio.enabled }}
      backend: s3
      s3:
        endpoint: {{ .Values.minio.name }}.{{ .Values.global.namespace }}.svc.cluster.local:9000
        bucket_name: mimir-blocks
        access_key_id: {{ .Values.minio.credentials.rootUser }}
        secret_access_key: {{ .Values.minio.credentials.rootPassword }}
        insecure: true
      {{- else }}
      backend: filesystem
      filesystem:
        dir: /data/blocks
      {{- end }}

    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    distributor:
      ring:
        kvstore:
          store: inmemory

    store_gateway:
      sharding_ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: inmemory

    ruler:
      ring:
        kvstore:
          store: inmemory

    limits:
      max_label_names_per_series: 30
      max_label_value_length: 2048
      ingestion_rate: 1000000
      ingestion_burst_size: 1000000
      out_of_order_time_window: 10m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: api-app-go
  labels:
    app: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      {{- if .Values.minio.enabled }}
      initContainers:
        - name: minio-init-bucket
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set myminio http://{{ .Values.minio.name }}.{{ .Values.global.namespace }}.svc.cluster.local:9000 {{ .Values.minio.credentials.rootUser }} {{ .Values.minio.credentials.rootPassword }}; do
                echo "Aguardando MinIO ficar disponivel..."
                sleep 5
              done
              mc mb --ignore-existing myminio/mimir-blocks
              echo "Bucket mimir-blocks criado/verificado com sucesso."
      {{- end }}
      containers:
        - name: mimir
          image: grafana/mimir:2.13.0
          args:
            - -config.file=/etc/mimir/mimir.yaml
            - -target=all
          ports:
            - containerPort: {{ .Values.mimir.config.server.httpListenPort }}
              name: http
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: mimir-storage
              mountPath: /data
            - name: mimir-config
              mountPath: /etc/mimir
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.mimir.config.server.httpListenPort }}
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.mimir.config.server.httpListenPort }}
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: mimir-storage
          persistentVolumeClaim:
            claimName: mimir-pvc
        - name: mimir-config
          configMap:
            name: mimir-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mimir-pvc
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.sizes.mimir }}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: api-app-go
spec:
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.mimir.config.server.httpListenPort }}
      targetPort: {{ .Values.mimir.config.server.httpListenPort }}
  selector:
    app: mimir